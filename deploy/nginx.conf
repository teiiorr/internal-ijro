# /etc/nginx/sites-available/ichki-ijro
# Replace ijro.bkrm.uz with your real domain.
# After editing:
#   sudo ln -s /etc/nginx/sites-available/ichki-ijro /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ijro.bkrm.uz

# Reasonable client upload size — must be >= MAX_UPLOAD_BYTES in .env.
client_max_body_size 30M;

# HTTP → HTTPS redirect. Certbot will rewrite this block after issuing certs.
server {
    listen 80;
    listen [::]:80;
    server_name ijro.bkrm.uz;

    # ACME challenge during cert issuance / renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — the real server block.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ijro.bkrm.uz;

    # Certbot fills these in for you on first run:
    # ssl_certificate     /etc/letsencrypt/live/ijro.bkrm.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ijro.bkrm.uz/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Don't ever cache HTML — Next.js handles caching for assets via headers.
    add_header Cache-Control "no-store" always;

    # ---- App ----
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- Static assets — long cache ----
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
